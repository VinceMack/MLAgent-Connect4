behaviors:
  Connect4:
    trainer_type: ppo
    hyperparameters:
      batch_size: 1024
      buffer_size: 10240
      learning_rate: 3.0e-4
    network_settings:
      hidden_units: 128
      num_layers: 2
    self_play:
      window: 10
      play_against_latest_model_ratio: 0.5
      save_steps: 20000
      swap_steps: 10000
    max_steps: 5000000
    time_horizon: 64
    summary_freq: 10000