behaviors:
  Connect4:
    trainer_type: ppo
    hyperparameters:
      batch_size: 2048
      buffer_size: 20480
      learning_rate: 2.0e-4
      beta: 1.0e-2 # High entropy encourages blocking exploration
      epsilon: 0.2
      lambd: 0.95
      num_epoch: 5
      learning_rate_schedule: linear
    network_settings:
      normalize: true
      hidden_units: 256 # Larger brain
      num_layers: 3   # Deeper brain
    reward_signals:
      extrinsic:
        gamma: 0.99
        strength: 1.0
    self_play:
      window: 10
      play_against_latest_model_ratio: 0.5
      save_steps: 40000
      swap_steps: 20000
    max_steps: 5000000
    time_horizon: 128
    summary_freq: 20000